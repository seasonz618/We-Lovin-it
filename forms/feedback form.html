<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport"
content="width=device-width,
initial-scale=1.0">
    <title>Feedback Form</title>
    <link rel="stylesheet" href="style.css">
    <style>
        #top nav ul { 
    position: fixed;
    display: flex;
    list-style-type: none;
    background-color: #ed0103;
    margin: 0;
    width: 100%;
    height: 90px;
    top: 0;
    left: 0;
    z-index: 4;
} /*Display: flex; allows items to be displayed in a row at the center of the navigation bar 
    list-style-type: none; makes the list items display without bullet points 
    margin: 0; makes it so that there is no default margin
    width: 100%; makes the navigation bar span the entire width of the page
    position: fixed; fixes the navigation bar at the top of the page
    top and left: 0; positions the navigation bar at the top-left corner of the page
    z-index: 4; ensures the navigation bar is displayed above other elements */
#top nav li {
    display: inline-block;
} /*display: inline-block; allows the list items to be displayed in a row */
#top nav a {
    color: black;
    text-decoration: none;
    /*text-decoration: none; removes the default underline from links */
}
#top a.a1 {
    margin-left: 20px;
}
#top img.image1 {
    max-width: 90px;
    height: 90px;
    object-fit: cover;
    object-position: center;
}
#top a.a2 {
    margin-left: 250px;
    margin-right: 15px;
}
#top img.image2 {
    margin-top: 20px;
    max-width: 45px;
    max-height: 45px;
}
#top a.Locate-us {
    display: flex;
    text-align: center;
    background-color: #ffc72c;
    padding: 10px 38px;
    border-radius: 40px;
    margin-block: 15px;
    margin-left: 60px;
    font-size: 30px;
    font-weight: bold;
}
#top a.Order {
    display: flex;
    text-align: center;
    background-color: #ffc72c;
    padding: 10px 20px;
    border-radius: 40px;
    margin: 15px 40px;
    font-size: 30px;
    font-weight: bold;
}
    </style>
    </head>
    <element id="top"><nav><ul>

    <li><a class="a1" href="Home.html">
    <img src="../images/McDonalds-Logo.png" class="image1" alt="Home">
    </a></li>

    <li><a class="a2" href="https://www.instagram.com/mcdsg/">
    <img src="../images/Instagram.png" class="image2" alt="IG">
    </a></li>

    <li><a href="locateus.html" class="Locate-us">Locate us
    </a></li>

    <li><a href= "#Order" class="Order">Order Now
    </a></li>
</ul></nav></element>

    <body>How was your experience with us? Please fill out the form below to provide your feedback.
        <h1>Feedback Form</h1>
        <form action="thankyou.html" method="get">
        </form>
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" size="30">
        <p>Feedback:</p>
        <textarea id="feedback" name="feedback" rows="4" cols="50"></textarea>
        <br>
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" size="30">
        <br>
        <label for="rating">Rating:</label>
        <input type="range" id="rating" size="500" name="rating" min="1" max="10" step="1"><br>
        <button type="submit" onclick="window.location.href='thankyou.html'">Submit Feedback</button>
    </body>
