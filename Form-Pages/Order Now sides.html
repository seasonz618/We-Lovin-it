<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>What side would you like?</title>
    <link rel="stylesheet" href="ordernow.css">
</head>
<body>
    <h1>What side would you like?</h1>
    <form action="Order Now drinks.html" method="get">
        <input type="radio" id="fries small" name="side" value="fries small">
        <label for="fries small">Fries Small</label><br>
        <input type="radio" id="salad" name="side" value="salad">
        <label for="salad">Salad</label><br>
        <input type="radio" id="corn" name="side" value="corn">
        <label for="corn">Corn</label><br>
        <input type="submit" value="Drinks">
    </form>
</body>
